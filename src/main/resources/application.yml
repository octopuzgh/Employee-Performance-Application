  #redis
  data:
    redis:
      host: 192.168.152.131
      port: 6379
      username: octopuz_remote
      password: Octopuz@123
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 100ms
          time-between-eviction-runs: 3000ms
  #kafka
  kafka:
      bootstrap-servers: 192.168.152.131:9092
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.apache.kafka.common.serialization.StringSerializer
        retries: 3
        acks: 1
      consumer:
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        group-id: operation-log-group
        auto-offset-reset: earliest
        enable-auto-commit: false
      listener:
        ack-mode: manual



  #返回最大行数
  jdbc:
    template:
      max-rows: 1000


mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl #打印sql到控制台
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

